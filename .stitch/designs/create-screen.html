            display: none;

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface font-body text-on-surface-variant selection:bg-primary-fixed">
<!-- Top App Bar -->
<header class="bg-[#fbf9f7] dark:bg-stone-950 flex justify-between items-center w-full px-6 py-4 sticky top-0 z-40">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#765163] dark:text-[#a37a8d]" data-icon="menu">menu</span>
<h1 class="font-headline text-[1.75rem] leading-none tracking-tighter text-[#765163] dark:text-[#a37a8d]">Graceful Homeschooling</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container overflow-hidden">
<img alt="User profile" class="w-full h-full object-cover" data-alt="Close up portrait of a smiling woman" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB7XBGwBnQZbkZ5GfntUvx_B9o00QyUt-IhBA6rrGmcNIZY9C_GDroqfxdI51UqdwdufvBaBkJNxJC4M26RjRrj5FqGy17OjjxM7p0f0NsT99lsECe1VeyMWReFpdfCrWYuhxJNQym4UfwOOtSRYfMc6o-xrBqEgSQZ2kTXtKfra1foGYR9-NX0Wl9t_Yw-KXpKVzvifjBGvby7L0eeC7bPWnWSdlYM_L504D6rcH-TaeGWCsARPsqc65QgkLDpV4DFwscCzOMG7Q"/>
</div>
</header>
<main class="max-w-2xl mx-auto px-6 pt-8 pb-32">
<!-- Editorial Header Section -->
<section class="mb-12">
<h2 class="font-headline text-[2.5rem] leading-tight text-[#A37A8D] mb-2 tracking-tight">What are you creating?</h2>
<p class="text-on-surface-variant font-body text-lg opacity-80">Select your medium and let us handle the rest.</p>
</section>
<!-- Platform Selection Section -->
<section class="mb-12">
<label class="font-label text-[0.75rem] uppercase tracking-widest text-outline mb-4 block">Select Platform</label>
<div class="space-y-3">
<!-- Selected Row -->
<button class="w-full flex items-center justify-between p-5 bg-surface-container-low border-l-4 border-accent rounded-r-xl transition-all duration-300 group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center bg-surface-container-lowest rounded-full shadow-sm text-primary">
<span class="material-symbols-outlined" data-icon="movie">movie</span>
</div>
<span class="font-semibold text-lg text-on-surface">Reels/TikTok</span>
</div>
<span class="material-symbols-outlined text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Inactive Rows -->
<button class="w-full flex items-center justify-between p-5 bg-surface-container-lowest rounded-xl hover:bg-surface-container-low transition-all duration-300 border border-transparent group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center bg-surface-container-low rounded-full text-on-surface-variant group-hover:bg-surface-container-lowest">
<span class="material-symbols-outlined" data-icon="facebook">social_leaderboard</span>
</div>
<span class="font-medium text-lg text-on-surface-variant">Facebook Post</span>
</div>
</button>
<button class="w-full flex items-center justify-between p-5 bg-surface-container-lowest rounded-xl hover:bg-surface-container-low transition-all duration-300 border border-transparent group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center bg-surface-container-low rounded-full text-on-surface-variant group-hover:bg-surface-container-lowest">
<span class="material-symbols-outlined" data-icon="video_library">video_library</span>
</div>
<span class="font-medium text-lg text-on-surface-variant">YouTube Video</span>
</div>
</button>
<button class="w-full flex items-center justify-between p-5 bg-surface-container-lowest rounded-xl hover:bg-surface-container-low transition-all duration-300 border border-transparent group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center bg-surface-container-low rounded-full text-on-surface-variant group-hover:bg-surface-container-lowest">
<span class="material-symbols-outlined" data-icon="view_carousel">view_carousel</span>
</div>
<span class="font-medium text-lg text-on-surface-variant">Instagram Carousel</span>
</div>
</button>
<button class="w-full flex items-center justify-between p-5 bg-surface-container-lowest rounded-xl hover:bg-surface-container-low transition-all duration-300 border border-transparent group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center bg-surface-container-low rounded-full text-on-surface-variant group-hover:bg-surface-container-lowest">
<span class="material-symbols-outlined" data-icon="image">image</span>
</div>
<span class="font-medium text-lg text-on-surface-variant">Static Image</span>
</div>
</button>
</div>
</section>

<label class="font-label text-[0.75rem] uppercase tracking-widest text-outline mb-4 block">Content Type</label>

<!-- Active Chip -->
<button class="whitespace-nowrap px-6 py-2.5 bg-[#765163] text-white rounded-full font-medium shadow-md transition-transform active:scale-95">
                    Educational
                </button>
<!-- Inactive Chips -->
<button class="whitespace-nowrap px-6 py-2.5 bg-surface-container-low text-on-surface-variant rounded-full font-medium hover:bg-surface-container-high transition-colors active:scale-95">
                    Story
                </button>
<button class="whitespace-nowrap px-6 py-2.5 bg-surface-container-low text-on-surface-variant rounded-full font-medium hover:bg-surface-container-high transition-colors active:scale-95">
                    Proof
                </button>
<button class="whitespace-nowrap px-6 py-2.5 bg-surface-container-low text-on-surface-variant rounded-full font-medium hover:bg-surface-container-high transition-colors active:scale-95">
                    Promo
                </button>
</div>
</section>
<!-- Generate Button -->
<section>
<button class="w-full bg-[#A37A8D] text-white py-5 rounded-full font-semibold text-lg shadow-[0px_10px_20px_rgba(163,122,141,0.2)] hover:bg-[#91697c] active:scale-95 transition-all duration-300">
                Create 3 Variants
            </button>

<span class="font-label text-[0.75rem] uppercase tracking-widest">Home</span>
</a>
<!-- Create (Active) -->
<a class="flex flex-col items-center justify-center bg-[#f5f3f1] dark:bg-stone-800 text-[#765163] dark:text-[#fbf9f7] rounded-[1.5rem] px-6 py-2 transition-transform duration-300 scale-100" href="#">

</a>

<span class="material-symbols-outlined mb-1" data-icon="local_library">local_library</span>
<span class="font-label text-[0.75rem] uppercase tracking-widest">Library</span>
</a>
